<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="https://i.imgur.com/7ytXTdA.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tamer Assist: Portable Advance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.12.17/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0c14;
      --bg-panel: #111520;
      --bg-card: #161b2e;
      --bg-elevated: #1e2540;
      --accent-cyan: #00d4ff;
      --accent-gold: #ffd700;
      --accent-red: #ff4444;
      --accent-green: #00ff88;
      --accent-blue: #4488ff;
      --border-glow: rgba(0,212,255,0.3);
      --text-primary: #e8eaf6;
      --text-secondary: #8892b0;
      --text-dim: #4a5568;
    }
    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
    }
    html, body { 
      margin:0; 
      padding:0; 
      background:var(--bg-deep); 
      color:var(--text-primary); 
      font-family:'Rajdhani',sans-serif; 
      overflow-x:hidden; 
      min-height:100vh; 
    }

    /* === MOBILE SHELL === */
    .mob-shell { 
      display:flex; 
      flex-direction:column; 
      height:100dvh; 
      overflow:hidden; 
    }
    .mob-header { 
      background:linear-gradient(180deg,#0d1117 0%,var(--bg-panel) 100%); 
      border-bottom:1px solid var(--border-glow); 
      padding:8px 12px 6px; 
      flex-shrink:0; 
      position:relative; 
      z-index:10; 
    }
    .mob-header::after { 
      content:''; 
      position:absolute; 
      bottom:-1px; 
      left:0; 
      right:0; 
      height:1px; 
      background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent); 
    }
    .header-logo { 
      height:30px; 
      width:auto; 
      filter:drop-shadow(0 0 8px rgba(0,212,255,0.5)); 
    }
    .mob-content { 
      flex:1; 
      overflow-y:auto; 
      overflow-x:hidden; 
      -webkit-overflow-scrolling:touch; 
      padding-bottom:68px; 
    }
    .mob-content::-webkit-scrollbar { 
      display:none; 
    }

    /* === Botones del fondo */
    .mob-nav { 
      position:fixed; 
      bottom:0; 
      left:0; 
      right:0; 
      background:var(--bg-panel); 
      border-top:1px solid var(--border-glow); 
      display:flex; 
      z-index:100; 
      height:62px; 
      padding-bottom:env(safe-area-inset-bottom,0); 
    }
    .mob-nav::before { 
      content:''; 
      position:absolute; 
      top:-1px; 
      left:0; 
      right:0; 
      height:1px; 
      background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent); 
    }
    .nav-tab { 
      flex:1; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      justify-content:center; 
      gap:2px; 
      cursor:pointer; 
      border:none; 
      background:transparent; 
      color:var(--text-dim); 
      font-family:'Rajdhani',sans-serif; 
      font-size:9px; 
      font-weight:700; 
      letter-spacing:0.5px; 
      text-transform:uppercase; 
      transition:all 0.15s; 
      position:relative; 
      padding:0; 
    }
    .nav-tab.active { 
      color:var(--accent-cyan); 
    }
    .nav-tab.active::before { 
      content:''; 
      position:absolute; 
      top:0; 
      left:20%; 
      right:20%; 
      height:2px; 
      background:var(--accent-cyan); 
      border-radius:0 0 3px 3px; 
      box-shadow:0 0 8px var(--accent-cyan); 
    }
    .nav-icon { 
      font-size:17px; 
      line-height:1; 
    }

    /* === PANELS === */
    .panel { 
      padding:10px; 
      animation:panelIn 0.18s ease; 
    }
    @keyframes panelIn { 
      from{opacity:0;transform:translateY(6px)} 
      to{opacity:1;transform:translateY(0)} 
    }
    .section-card { 
      background:var(--bg-card); 
      border:1px solid rgba(255,255,255,0.07); 
      border-radius:12px; 
      padding:12px 14px; 
      margin-bottom:10px; 
      position:relative; 
      overflow:visible; 
    }
    .section-card::before { 
      content:''; 
      position:absolute; 
      top:0; 
      left:0; 
      right:0; 
      height:2px; 
      background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent); 
      opacity:0.4; 
      border-radius:12px 12px 0 0; 
    }
    .section-title { 
      font-family:'Orbitron',monospace; 
      font-size:10px; 
      font-weight:700; 
      letter-spacing:2px; 
      text-transform:uppercase; 
      color:var(--accent-cyan); 
      margin-bottom:10px; 
      display:flex; 
      align-items:center; 
      gap:8px; 
    }
    .section-title::after { 
      content:''; 
      flex:1; 
      height:1px; 
      background:linear-gradient(90deg,var(--border-glow),transparent); 
    }

    /* === DROPDOWN — fixed to viewport === */
    .mob-select-wrap { 
      position:relative; 
    }
    .mob-select-btn { 
      width:100%; 
      background:var(--bg-elevated); 
      border:1px solid rgba(255,255,255,0.1); 
      border-radius:8px; 
      padding:10px 12px; 
      color:var(--text-primary); 
      font-family:'Rajdhani',sans-serif; 
      font-size:15px; 
      font-weight:600; 
      display:flex; 
      align-items:center; 
      gap:8px; 
      cursor:pointer; 
      transition:border-color 0.15s; 
    }
    .mob-select-btn:active { 
      border-color:var(--accent-cyan); 
    }
    .mob-select-btn:disabled { 
      opacity:0.4; 
      cursor:not-allowed; 
    }
    .mob-select-btn .arrow { 
      margin-left:auto; 
      color:var(--text-secondary); 
      font-size:11px; 
    }

    /* Dropdown rendered as fixed overlay */
    .mob-dropdown-overlay { 
      position:fixed; 
      inset:0; 
      z-index:9999; 
      display:flex; 
      flex-direction:column; 
      justify-content:flex-end; 
      background:rgba(0,0,0,0.7); 
      animation:fadeIn 0.15s ease; 
    }
    @keyframes fadeIn { 
      from{opacity:0} 
      to{opacity:1} 
    }
    .mob-dropdown-sheet { 
      background:#1a1f35; 
      border-top:1px solid var(--border-glow); 
      border-radius:16px 16px 0 0; 
      max-height:55vh; 
      display:flex; 
      flex-direction:column; 
    }
    .mob-dropdown-header { 
      padding:12px 16px; 
      display:flex; 
      align-items:center; 
      justify-content:space-between; 
      border-bottom:1px solid rgba(255,255,255,0.08); 
      flex-shrink:0; 
    }
    .mob-dropdown-title { 
      font-family:'Orbitron',monospace; 
      font-size:11px; 
      font-weight:700; 
      color:var(--accent-cyan); 
      letter-spacing:2px; 
    }
    .mob-dropdown-close { 
      background:rgba(255,68,68,0.1); 
      border:1px solid rgba(255,68,68,0.3); 
      border-radius:6px; 
      padding:4px 12px; 
      color:var(--accent-red); 
      font-family:'Orbitron',monospace; 
      font-size:10px; 
      cursor:pointer; 
    }
    .mob-dropdown-list { 
      overflow-y:auto; 
      flex:1; 
      padding:4px 0; 
    }
    .mob-dropdown-list::-webkit-scrollbar { 
      width:3px; 
    }
    .mob-dropdown-list::-webkit-scrollbar-thumb { 
      background:var(--accent-cyan); 
      border-radius:2px; 
    }
    .mob-dropdown-item { 
      padding:13px 16px; 
      display:flex; 
      align-items:center; 
      gap:12px; 
      cursor:pointer; 
      font-size:15px; 
      font-weight:600; 
      color:var(--text-primary); 
      border-bottom:1px solid rgba(255,255,255,0.04); 
      transition:background 0.1s; 
    }
    .mob-dropdown-item:active, 
    .mob-dropdown-item.selected { 
      background:rgba(0,212,255,0.12); 
      color:var(--accent-cyan); 
    }

    /* === LEVEL PILLS === */
    .level-pills { 
      display:grid; 
      grid-template-columns:repeat(4,1fr); 
      gap:6px; 
    }
    .level-pill { 
      background:var(--bg-elevated); 
      border:1px solid rgba(255,255,255,0.08); 
      border-radius:8px; 
      padding:9px 4px; 
      text-align:center; 
      font-family:'Orbitron',monospace; 
      font-size:9px; 
      font-weight:700; 
      letter-spacing:0.5px; 
      color:var(--text-secondary); 
      cursor:pointer; 
      transition:all 0.15s; 
    }
    .level-pill.active { 
      background:rgba(0,212,255,0.15); 
      border-color:var(--accent-cyan); 
      color:var(--accent-cyan); 
      box-shadow:0 0 12px rgba(0,212,255,0.2); 
    }

    /* === mini cartas de stats === */
    .stat-card-mini { 
      display:flex; 
      align-items:center; 
      gap:5px; 
      padding:8px 7px; 
      border-radius:8px; 
    }
    .stat-card-mini.hp { background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.25); }
    .stat-card-mini.atk { background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.25); }
    .stat-card-mini.spd { background:rgba(68,136,255,0.1); border:1px solid rgba(68,136,255,0.25); }
    .stat-card-mini.def { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); }
    .stat-mini-label { 
      font-family:'Orbitron',monospace; 
      font-size:9px; 
      font-weight:700; 
      letter-spacing:0.5px; 
      flex-shrink:0; 
      width:24px; 
    }
    .stat-mini-vals { 
      text-align:left; 
    }
    .stat-mini-total { 
      font-family:'Orbitron',monospace; 
      font-size:17px; 
      font-weight:700; 
      line-height:1; 
    }
    .stat-mini-breakdown { 
      font-size:11px; 
      font-weight:600; 
      color:rgba(255,255,255,0.55); 
      margin-top:2px; 
    }

    /* === RESULT HERO === */
    .result-hero { 
      background:var(--bg-card); 
      border:1px solid rgba(255,255,255,0.07); 
      border-radius:16px; 
      overflow:hidden; 
      margin-bottom:10px; 
    }
    .result-header { 
      background:linear-gradient(135deg,#0d1117,#1a2035); 
      padding:10px 14px; 
      display:flex; 
      align-items:center; 
      justify-content:space-between; 
      border-bottom:1px solid rgba(0,212,255,0.2); 
    }
    .result-name { 
      font-family:'Orbitron',monospace; 
      font-size:18px; 
      font-weight:900; 
      color:white; 
      text-shadow:0 0 20px rgba(0,212,255,0.6); 
      letter-spacing:1px; 
    }
    .result-digi-area { 
      display:flex; 
      align-items:stretch; 
      border-bottom:1px solid rgba(255,255,255,0.06); 
    }
    .result-img-container { 
      flex:1; 
      min-width:0; 
      position:relative; 
      overflow:hidden; 
      display:flex; 
      align-items:flex-end; 
      justify-content:center; 
      min-height:160px; 
    }
    .result-img-bg { 
      position:absolute; 
      inset:0; 
      width:100%; 
      height:100%; 
      object-fit:cover; 
      object-position:center bottom; 
      opacity:0.35; 
    }
    .result-img { 
      position:relative; 
      z-index:1; 
      max-width:100%; 
      width:auto; 
      height:100%; 
      max-height:100%; 
      object-fit:contain; 
      object-position:bottom center; 
      display:block; 
    }
    .result-stats-grid { 
      width:110px; 
      flex-shrink:0; 
      padding:6px 6px; 
      display:flex; 
      flex-direction:column; 
      justify-content:space-evenly; 
    }

    /* === TRAINING STAT BLOCK === */
    .training-stat-block { 
      margin-bottom:12px; 
    }
    .training-stat-header { 
      display:flex; 
      align-items:center; 
      justify-content:space-between; 
      margin-bottom:5px; 
    }
    .training-stat-name { 
      font-family:'Orbitron',monospace; 
      font-size:10px; 
      font-weight:700; 
      letter-spacing:1px; 
    }
    .training-stat-pct { 
      font-family:'Orbitron',monospace; 
      font-size:12px; 
      font-weight:700; 
      color:var(--accent-gold); 
    }
    input[type=range] { 
      -webkit-appearance:none; 
      width:100%; 
      height:7px; 
      border-radius:4px; 
      outline:none; 
      cursor:pointer; 
    }
    input[type=range]::-webkit-slider-thumb { 
      -webkit-appearance:none; 
      width:22px; 
      height:22px; 
      border-radius:50%; 
      background:white; 
      border:2px solid var(--accent-cyan); 
      box-shadow:0 0 8px rgba(0,212,255,0.4); 
      cursor:pointer; 
    }
    input[type=range]:disabled { 
      opacity:0.4; 
      cursor:not-allowed; 
    }

    /* === LOCK BTN === */
    .lock-btn { 
      width:32px; 
      height:32px; 
      border-radius:6px; 
      border:1px solid rgba(255,255,255,0.1); 
      background:var(--bg-elevated); 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      cursor:pointer; 
      font-size:14px; 
      flex-shrink:0; 
      transition:all 0.15s; 
    }
    .lock-btn.locked { 
      border-color:var(--accent-gold); 
      background:rgba(255,215,0,0.15); 
    }

    /* === ACTION BTNS === */
    .action-btn { 
      width:100%; 
      padding:12px; 
      border-radius:10px; 
      border:none; 
      font-family:'Orbitron',monospace; 
      font-size:11px; 
      font-weight:700; 
      letter-spacing:1px; 
      cursor:pointer; 
      transition:all 0.15s; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      gap:8px; 
    }
    .action-btn:active { 
      transform:scale(0.98); 
    }
    .action-btn.primary { 
      background:rgba(0,212,255,0.12); 
      border:1px solid var(--accent-cyan); 
      color:var(--accent-cyan); 
    }
    .action-btn.danger { 
      background:rgba(255,68,68,0.1); 
      border:1px solid rgba(255,68,68,0.4); 
      color:var(--accent-red); 
    }
    .action-btn.success { 
      background:rgba(0,255,136,0.1); 
      border:1px solid rgba(0,255,136,0.3); 
      color:var(--accent-green); 
    }
    .action-btn.gold { 
      background:rgba(255,215,0,0.1); 
      border:1px solid rgba(255,215,0,0.4); 
      color:var(--accent-gold); 
    }
    .action-btn.purple { 
      background:rgba(168,85,247,0.12); 
      border:1px solid rgba(168,85,247,0.4); 
      color:#c084fc; 
    }
    .action-btn:disabled { 
      opacity:0.4; 
      cursor:not-allowed; 
      transform:none; 
    }

    /* === CRIT SECTION === */
    .crit-section { 
      background:linear-gradient(135deg,rgba(255,215,0,0.06),rgba(255,215,0,0.02)); 
      border:1px solid rgba(255,215,0,0.2); 
      border-radius:10px; 
      padding:12px; 
      margin-bottom:10px; 
    }
    .crit-bar-track { 
      height:8px; 
      background:rgba(255,255,255,0.06); 
      border-radius:4px; 
      overflow:hidden; 
    }
    .crit-bar-fill { 
      height:100%; 
      border-radius:4px; 
      background:linear-gradient(90deg,#f59e0b,#ffd700,#fffacd); 
      transition:width 0.5s ease; 
      box-shadow:0 0 8px rgba(255,215,0,0.5); 
    }
    .crit-mark { 
      font-family:'Orbitron',monospace; 
      font-size:8px; 
      color:var(--text-dim); 
    }
    .crit-mark.active { 
      color:var(--accent-gold); 
      font-weight:700; 
    }

    /* === SAVE SLOTS === */
    .save-slot { 
      display:flex; 
      align-items:center; 
      gap:10px; 
      padding:10px 12px; 
      background:var(--bg-elevated); 
      border:1px solid rgba(255,255,255,0.07); 
      border-radius:10px; 
      margin-bottom:7px; 
      cursor:pointer; 
      transition:all 0.15s; 
    }
    .save-slot:active { 
      background:rgba(0,212,255,0.08); 
      border-color:var(--border-glow); 
    }
    .save-slot-icon { 
      width:36px; 
      height:36px; 
      border-radius:8px; 
      background:var(--bg-deep); 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      overflow:hidden; 
      flex-shrink:0; 
    }
    .save-slot-name { 
      flex:1; 
      font-family:'Rajdhani',sans-serif; 
      font-size:14px; 
      font-weight:700; 
    }
    .compare-btn-sm { 
      padding:6px 10px; 
      border-radius:6px; 
      border:1px solid var(--accent-blue); 
      background:rgba(68,136,255,0.15); 
      color:var(--accent-blue); 
      font-family:'Orbitron',monospace; 
      font-size:9px; 
      font-weight:700; 
      cursor:pointer; 
      letter-spacing:0.5px; 
    }

    /* === FOOD ITEMS === */
    .food-grid { 
      display:grid; 
      grid-template-columns:repeat(3,1fr); 
      gap:8px; 
    }
    .food-item-btn { 
      aspect-ratio:1; 
      border-radius:10px; 
      border:1px solid rgba(255,255,255,0.1); 
      background:var(--bg-elevated); 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      justify-content:center; 
      cursor:pointer; 
      padding:6px; 
      gap:3px; 
    }
    .food-item-btn:active:not(:disabled) { 
      transform:scale(0.94); 
      background:rgba(0,212,255,0.1); 
      border-color:var(--accent-cyan); 
    }
    .food-item-btn:disabled { 
      opacity:0.35; 
      cursor:not-allowed; 
      filter:grayscale(80%); 
    }
    .food-item-btn img { 
      width:40px; 
      height:40px; 
      object-fit:contain; 
    }
    .food-item-label { 
      font-size:10px; 
      font-family:'Rajdhani',sans-serif; 
      font-weight:700; 
      color:var(--text-secondary); 
      text-align:center; 
    }

    /* === INSTALL === */
    .install-value-grid { 
      display:grid; 
      grid-template-columns:repeat(5,1fr); 
      gap:5px; 
      margin-bottom:12px; 
    }
    .install-val-btn { 
      padding:8px 4px; 
      border-radius:8px; 
      border:1px solid rgba(255,255,255,0.08); 
      background:var(--bg-elevated); 
      color:var(--text-secondary); 
      font-family:'Orbitron',monospace; 
      font-size:12px; 
      font-weight:700; 
      cursor:pointer; 
      text-align:center; 
      transition:all 0.15s; 
    }
    .install-val-btn.active { 
      background:rgba(168,85,247,0.2); 
      border-color:#a855f7; 
      color:#c084fc; 
    }
    .install-stat-selector { 
      display:grid; 
      grid-template-columns:repeat(3,1fr); 
      gap:8px; 
      margin-bottom:12px; 
    }
    .install-stat-btn { 
      padding:12px; 
      border-radius:10px; 
      border:2px solid rgba(255,255,255,0.1); 
      background:var(--bg-elevated); 
      cursor:pointer; 
      transition:all 0.15s; 
      font-family:'Orbitron',monospace; 
      font-size:10px; 
      font-weight:700; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      gap:5px; 
    }
    .install-stat-btn .dot { 
      width:12px; 
      height:12px; 
      border-radius:50%; 
    }

    /* === COMPARE OVERLAY === */
    .compare-overlay { 
      position:fixed; 
      inset:0; 
      background:rgba(0,0,0,0.85); 
      z-index:300; 
      display:flex; 
      flex-direction:column; 
      animation:fadeIn 0.2s ease; 
    }
    .compare-header { 
      background:var(--bg-panel); 
      border-bottom:1px solid var(--border-glow); 
      padding:12px 16px; 
      display:flex; 
      align-items:center; 
      justify-content:space-between; 
      flex-shrink:0; 
    }
    .compare-content { 
      flex:1; 
      overflow-y:auto; 
      padding:12px; 
      display:flex; 
      flex-direction:column; 
      gap:10px; 
    }
    .compare-content::-webkit-scrollbar { 
      display:none; 
    }

    /* === MINI PREVIEW (Train tab) === */
    .mini-preview { 
      background:var(--bg-card); 
      border:1px solid rgba(255,255,255,0.07); 
      border-radius:10px; 
      padding:10px 12px; 
      margin-bottom:10px; 
      display:flex; 
      gap:10px; 
      align-items:center; 
    }
    .mini-preview-img { 
      width:56px; 
      height:56px; 
      object-fit:contain; 
      flex-shrink:0; 
    }
    .mini-stat-row { 
      display:flex; 
      align-items:center; 
      gap:6px; 
    }
    .mini-stat-label { 
      font-family:'Orbitron',monospace; 
      font-size:9px; 
      width:28px; 
      flex-shrink:0; 
    }
    .mini-stat-bar { 
      flex:1; 
      height:5px; 
      background:rgba(255,255,255,0.06); 
      border-radius:3px; 
      overflow:hidden; 
    }
    .mini-stat-fill { 
      height:100%; 
      border-radius:3px; 
    }
    .mini-stat-val { 
      font-family:'Orbitron',monospace; 
      font-size:10px; 
      font-weight:700; 
      width:36px; 
      text-align:right; 
      flex-shrink:0; 
    }

    /* === TOAST === */
    .toast { 
      position:fixed; 
      bottom:76px; 
      left:50%; 
      transform:translateX(-50%); 
      background:rgba(0,212,255,0.12); 
      border:1px solid var(--accent-cyan); 
      border-radius:20px; 
      padding:7px 18px; 
      color:var(--accent-cyan); 
      font-family:'Orbitron',monospace; 
      font-size:10px; 
      font-weight:700; 
      letter-spacing:1px; 
      z-index:500; 
      backdrop-filter:blur(10px); 
      white-space:nowrap; 
      animation:toastAnim 2s ease forwards; 
    }
    @keyframes toastAnim { 
      0%{opacity:0;transform:translateX(-50%) translateY(12px)} 
      15%{opacity:1;transform:translateX(-50%) translateY(0)} 
      75%{opacity:1} 
      100%{opacity:0;transform:translateX(-50%) translateY(-8px)} 
    }

    /* num input */
    .num-input { 
      background:var(--bg-elevated); 
      border:1px solid rgba(255,255,255,0.1); 
      border-radius:8px; 
      padding:9px 10px; 
      color:var(--text-primary); 
      font-family:'Orbitron',monospace; 
      font-size:13px; 
      font-weight:600; 
      width:100%; 
      outline:none; 
      transition:border-color 0.15s; 
    }
    .num-input:focus { 
      border-color:var(--accent-cyan); 
    }

    /* method toggle */
    .method-toggle { 
      display:grid; 
      grid-template-columns:repeat(3,1fr); 
      gap:3px; 
      background:var(--bg-deep); 
      border-radius:10px; 
      padding:3px; 
      margin-bottom:12px; 
    }
    .method-btn { 
      padding:7px 3px; 
      border-radius:7px; 
      border:none; 
      background:transparent; 
      color:var(--text-dim); 
      font-family:'Rajdhani',sans-serif; 
      font-size:10px; 
      font-weight:700; 
      cursor:pointer; 
      transition:all 0.15s; 
      line-height:1.2; 
    }
    .method-btn.active { 
      background:var(--bg-elevated); 
      color:var(--accent-cyan); 
    }

    /* lineage */
    .lineage-display { 
      display:flex; 
      align-items:center; 
      gap:6px; 
      flex-wrap:wrap; 
      padding:8px; 
      background:rgba(0,0,0,0.3); 
      border-radius:8px; 
    }
    .lineage-badge { 
      display:flex; 
      align-items:center; 
      gap:4px; 
      background:rgba(255,255,255,0.05); 
      border-radius:6px; 
      padding:4px 8px; 
    }

    /* type badges */
    .type-badge-img { 
      height:26px; 
      width:auto; 
      filter:drop-shadow(0 0 4px rgba(255,255,255,0.3)); 
    }

    /* progress ring */
    .ring-svg { 
      transform:rotate(-90deg); 
    }
    .ring-track { 
      fill:none; 
      stroke:rgba(255,255,255,0.08); 
    }
    .ring-fill { 
      fill:none; 
      stroke-linecap:round; 
      transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1); 
    }

    @media(min-width:768px){
      body { 
        background-image:url('https://i.imgur.com/DieNWGz.png'); 
        background-size:cover; 
        background-position:center; 
        font-family:Consolas,monospace; 
      }
    }
  </style>

    function scumonBase(child) {
      const s = DigimonStats[child];
      if (!s) return null;
      const m = 1.34;
      return {
        HP:  Math.round(s.HP  * m),
        ATK: Math.round(s.ATK * m),
        SPD: Math.round(s.SPD * m),
        DEF: Math.round(s.DEF * m),
        Type: "Virus"
      };
    }

    function kingScumonBase(child) {
      const s = scumonBase(child);
      if (!s) return null;
      const m = 2.25;
      return {
        HP:  Math.round(s.HP  * m),
        ATK: Math.round(s.ATK * m),
        SPD: Math.round(s.SPD * m),
        DEF: Math.round(s.DEF * m),
        Type: "Virus"
      };
    }

    function getBase(digi, lvl, digi2, child) {
      if (digi === "Scumon" && lvl === "Adult" && child) return scumonBase(child);
      if (digi === "KingScumon" && lvl === "Perfect" && child) return kingScumonBase(child);
      return DigimonStats[digi];
    }

    function getChildInh(child, selBaby) {
      if (specialChildren.includes(child)) {
        const cb = DigimonStats[child];
        const sbi = babyInherit[selBaby] || {HP:0,ATK:0,SPD:0,DEF:0};
        return {
          HP:  sbi.HP  + Math.round(0.4 * cb.HP),
          ATK: sbi.ATK + Math.round(0.4 * cb.ATK),
          SPD: sbi.SPD + Math.round(0.4 * cb.SPD),
          DEF: sbi.DEF + Math.round(0.4 * cb.DEF)
        };
      }
      return childInherit[child];
    }

    function getAdultInh(adult, child) {
      if (adult === "Scumon") {
        const s = scumonBase(child);
        return s ? {
          HP:  Math.round(s.HP  * 0.4),
          ATK: Math.round(s.ATK * 0.4),
          SPD: Math.round(s.SPD * 0.4),
          DEF: Math.round(s.DEF * 0.4)
        } : null;
      }
      return adult2PerfInherit[adult];
    }

    function getNatStats(digi, lvl, child, adult, perfect, digi2, selBaby = "V0") {
      const base = getBase(digi, lvl, digi2, child);
      if (!base) return null;

      if (lvl === "Child") {
        if (babyTamas.includes(digi2)) {
          const ih = babyInherit[digi2];
          return {
            HP: base.HP + ih.HP,
            ATK: base.ATK + ih.ATK,
            SPD: base.SPD + ih.SPD,
            DEF: base.DEF + ih.DEF,
            Type: base.Type,
            DType: base.DType
          };
        }
        if (specialChildren.includes(digi)) {
          const sbi = babyInherit[selBaby];
          return {
            HP: base.HP + sbi.HP,
            ATK: base.ATK + sbi.ATK,
            SPD: base.SPD + sbi.SPD,
            DEF: base.DEF + sbi.DEF,
            Type: base.Type,
            DType: base.DType
          };
        }
        return base;
      }

      if (lvl === "Adult") {
        const ci = getChildInh(child, selBaby);
        if (!ci) return null;
        return {
          HP:  base.HP  + ci.HP,
          ATK: base.ATK + ci.ATK,
          SPD: base.SPD + ci.SPD,
          DEF: base.DEF + ci.DEF
        };
      }

      if (lvl === "Perfect") {
        const ci = getChildInh(child, selBaby);
        const ai = getAdultInh(adult, child);
        if (!ci || !ai) return null;
        return {
          HP:  base.HP  + ci.HP  + ai.HP,
          ATK: base.ATK + ci.ATK + ai.ATK,
          SPD: base.SPD + ci.SPD + ai.SPD,
          DEF: base.DEF + ci.DEF + ai.DEF
        };
      }

      if (lvl === "Ultimate") {
        const ci = getChildInh(child, selBaby);
        const ai = getAdultInh(adult, child);
        const pi = perf2UltInherit[perfect];
        if (!ci || !ai || !pi) return null;
        return {
          HP:  base.HP  + ci.HP  + ai.HP  + pi.HP,
          ATK: base.ATK + ci.ATK + ai.ATK + pi.ATK,
          SPD: base.SPD + ci.SPD + ai.SPD + pi.SPD,
          DEF: base.DEF + ci.DEF + ai.DEF + pi.DEF
        };
      }
      return null;
    }

    function calcTrained(ns, pts) {
      const hI = ns.HP * HP_MULT * pts.hp;
      const aI = ATK_SPD_MULT * pts.atk;
      const sI = ATK_SPD_MULT * pts.spd;
      return {
        HP:  Math.round(ns.HP + hI),
        ATK: Math.round(ns.ATK + aI),
        SPD: Math.round(ns.SPD + sI),
        DEF: ns.DEF,
        hpI:  Math.round(hI  * 100) / 100,
        atkI: Math.round(aI  * 100) / 100,
        spdI: Math.round(sI  * 100) / 100
      };
    }

    /* ─── Bottom-sheet Select ────── */
    function MobSelect({ label, options, value, onChange, disabled, showImage = true }) {
      const [open, setOpen] = React.useState(false);
      const sel = options.find(o => o.value === value);

      if (disabled) {
        return (
          <button className="mob-select-btn" disabled style={{ marginBottom: 0 }}>
            <span style={{ color: 'var(--text-dim)', flex: 1 }}>
              {sel ? sel.label : `Select ${label || '...'}`}
            </span>
            <span className="arrow">▾</span>
          </button>
        );
      }

      return (
        <>
          <button 
            className="mob-select-btn" 
            onClick={() => setOpen(true)} 
            type="button" 
            style={{ marginBottom: 0 }}
          >
            {sel ? (
              <span style={{ display: 'flex', alignItems: 'center', gap: 8, flex: 1 }}>
                {showImage && (
                  <img 
                    src={chibiImages[sel.value] || placeholderImg} 
                    alt="" 
                    onError={e => e.target.style.display = 'none'} 
                    style={{ 
                      width: 24, 
                      height: 24, 
                      objectFit: 'contain', 
                      borderRadius: 4, 
                      background: 'rgba(0,0,0,0.3)' 
                    }} 
                  />
                )}
                <span>{sel.label}</span>
              </span>
            ) : (
              <span style={{ color: 'var(--text-dim)', flex: 1 }}>Select {label}</span>
            )}
            <span className="arrow">▾</span>
          </button>

          {open && (
            <div 
              className="mob-dropdown-overlay" 
              onClick={() => setOpen(false)}
            >
              <div 
                className="mob-dropdown-sheet" 
                onClick={e => e.stopPropagation()}
              >
                <div className="mob-dropdown-header">
                  <span className="mob-dropdown-title">{label || 'SELECT'}</span>
                  <button 
                    className="mob-dropdown-close" 
                    onClick={() => setOpen(false)}
                  >
                    ✕ CLOSE
                  </button>
                </div>
                <div className="mob-dropdown-list">
                  {options.map(opt => (
                    <div 
                      key={opt.value} 
                      className={`mob-dropdown-item ${opt.value === value ? 'selected' : ''}`}
                      onClick={() => { onChange(opt.value); setOpen(false); }}
                    >
                      {showImage && (
                        <img 
                          src={chibiImages[opt.value] || placeholderImg} 
                          alt="" 
                          onError={e => e.target.style.display = 'none'} 
                          style={{ 
                            width: 32, 
                            height: 32, 
                            objectFit: 'contain', 
                            borderRadius: 6, 
                            background: 'rgba(0,0,0,0.3)' 
                          }} 
                        />
                      )}
                      <span>{opt.label}</span>
                      {opt.value === value && (
                        <span style={{ marginLeft: 'auto', color: 'var(--accent-cyan)', fontSize: 14 }}>✓</span>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    /* ─── Toast ────*/
    function Toast({ msg, onDone }) {
      React.useEffect(() => {
        const t = setTimeout(onDone, 2500);
        return () => clearTimeout(t);
      }, []);

      if (msg && msg.type === 'item') {
        const { item, delta } = msg;
        const parts = [];
        if (delta.hp)  parts.push({ label: 'HP',  val: delta.hp,  color: '#00ff88' });
        if (delta.atk) parts.push({ label: 'ATK', val: delta.atk, color: '#ff6666' });
        if (delta.spd) parts.push({ label: 'SPD', val: delta.spd, color: '#4488ff' });

        return (
          <div className="toast" style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 160 }}>
            <div style={{

    /* scrapped piechart i need to clean up */
    function PieChart({ hpPct, atkPct, spdPct }) {
      const W = 160;
      const CX = 60;
      const CY = 60;
      const R = 50;
      const LEN = 40;

      const segs = [
        { pct: hpPct,  color: '#00ff88', label: 'HP' },
        { pct: atkPct, color: '#ff4444', label: 'ATK' },
        { pct: spdPct, color: '#4488ff', label: 'SPD' }
      ].filter(s => s.pct > 0);

      let start = -90;
      const slices = [];

      segs.forEach((seg, i) => {
        const angle = seg.pct / 100 * 360;
        const end = start + angle;
        const midAngle = (start + end) / 2;
        const rad = Math.PI / 180;

        const x1 = CX + R * Math.cos(start * rad);
        const y1 = CY + R * Math.sin(start * rad);
        const x2 = CX + R * Math.cos(end   * rad);
        const y2 = CY + R * Math.sin(end   * rad);

        const la = angle > 180 ? 1 : 0;
        const mx = CX + (R + 8) * Math.cos(midAngle * rad);
        const my = CY + (R + 8) * Math.sin(midAngle * rad);

        const lx2 = CX + 100;
        const ly2 = 40 + i * 36;

        slices.push({
          ...seg,
          pathD: `M${CX},${CY} L${x1},${y1} A${R},${R},0,${la},1,${x2},${y2} Z`,
          midX: mx,
          midY: my,
          lx2,
          ly2,
          end
        });

        start = end;
      });

      return (
        <svg 
          viewBox={`0 0 ${W} 135`} 
          style={{ width: '100%', maxWidth: 260, display: 'block', margin: '0 auto' }}
        >
          {slices.map((s, i) => (
            <g key={i}>
              <path 
                d={s.pathD} 
                fill={s.color} 
                opacity="0.9" 
                stroke="rgba(0,0,0,0.3)" 
                strokeWidth="1" 
              />
              <line 
                x1={s.midX} 
                y1={s.midY} 
                x2={s.lx2} 
                y2={s.ly2} 
                stroke={s.color} 
                strokeWidth="1.5" 
                opacity="0.8" 
              />
              <circle 
                cx={s.lx2} 
                cy={s.ly2} 
                r="2" 
                fill={s.color} 
              />
              <text 
                x={s.lx2 + 5} 
                y={s.ly2 - 6} 
                fill={s.color} 
                fontSize="9" 
                fontFamily="Orbitron,monospace" 
                fontWeight="700"
              >
                {s.label}
              </text>
              <text 
                x={s.lx2 + 5} 
                y={s.ly2 + 7} 
                fill="white" 
                fontSize="11" 
                fontFamily="Orbitron,monospace" 
                fontWeight="700"
              >
                {s.pct.toFixed(1)}%
              </text>
            </g>
          ))}
        </svg>
      );
    }

    /* ─── Progress Ring ────────────────────────────────── */
    function ProgressRing({ pct, usedPts, maxPts }) {
      const r = 42;
      const circ = 2 * Math.PI * r;
      const offset = circ * (1 - pct / 100);

      const gradId = "ringGrad";

      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <svg width="110" height="110" viewBox="0 0 110 110">

                <stop offset="0%" stopColor="#ffd700" />
                <stop offset="100%" stopColor="#ff2244" />
              </linearGradient>
            </defs>
            <circle 
              cx="55" 
              cy="55" 
              r={r} 
              fill="none" 
              stroke="rgba(255,255,255,0.07)" 
              strokeWidth="10" 
            />
            <circle 
              cx="55" 
              cy="55" 
              r={r} 
              fill="none" 
              stroke={`url(#${gradId})`} 
              strokeWidth="10"
              strokeLinecap="round" 
              strokeDasharray={circ} 
              strokeDashoffset={offset}
              transform="rotate(-90 55 55)" 
              style={{ transition: 'stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1)' }}
            />
            <text 
              x="55" 
              y="49" 
              textAnchor="middle" 
              fill="white" 
              fontFamily="Orbitron,monospace" 
              fontSize="14" 
              fontWeight="700"
            >
              {Math.floor(usedPts * 10) / 10}
            </text>
            <text 
              x="55" 
              y="64" 
              textAnchor="middle" 
              fill="rgba(255,255,255,0.4)" 
              fontFamily="Orbitron,monospace" 
              fontSize="9"
            >
              USED
            </text>
            <text 
              x="55" 
              y="76" 
              textAnchor="middle" 
              fill="rgba(255,255,255,0.3)"

              fontSize="9"

          </svg>
          <div style={{

            fontWeight: 700 
          }}>
            {pct.toFixed(0)}% TRAINED

        </div>

    function App() {
      return <MobileApp />;
    }

    function MobileApp() {
      const [tab, setTab] = React.useState("config");
      const [toast, setToast] = React.useState(null);

      const [digitama, setDigitama] = React.useState("V0");
      const [level, setLevel] = React.useState("Child");
      const [prevLevel, setPrevLevel] = React.useState("Child");
      const [selDigi, setSelDigi] = React.useState("");
      const [selChild, setSelChild] = React.useState("");
      const [selAdult, setSelAdult] = React.useState("");
      const [selPerf, setSelPerf] = React.useState("");
      const [selBaby, setSelBaby] = React.useState("V0");
      const [selSplit, setSelSplit] = React.useState("PerfectBalance");
      const [inputMethod, setInputMethod] = React.useState("Porcentaje");

      const [tp, setTp] = React.useState({
        child:    { hp: 0, atk: 0, spd: 0 },
        adult:    { hp: 0, atk: 0, spd: 0 },
        perfect:  { hp: 0, atk: 0, spd: 0 },
        ultimate: { hp: 0, atk: 0, spd: 0 }
      });

      const [pct, setPct] = React.useState({
        child:    { hp: 33.33, atk: 33.33, spd: 33.34 },
        adult:    { hp: 33.33, atk: 33.33, spd: 33.34 },
        perfect:  { hp: 33.33, atk: 33.33, spd: 33.34 },
        ultimate: { hp: 33.33, atk: 33.33, spd: 33.34 }
      });

      const [siInput, setSiInput] = React.useState({
        child:    { hp: "", atk: "", spd: "" },
        adult:    { hp: "", atk: "", spd: "" },
        perfect:  { hp: "", atk: "", spd: "" },
        ultimate: { hp: "", atk: "", spd: "" }
      });

      const [stats, setStats] = React.useState(null);
      const [locked, setLocked] = React.useState({
        child:    { hp: false, atk: false, spd: false },
        adult:    { hp: false, atk: false, spd: false },
        perfect:  { hp: false, atk: false, spd: false },
        ultimate: { hp: false, atk: false, spd: false }
      });

      const [savedSlots, setSavedSlots] = React.useState(Array(6).fill(null));
      const [savedLineage, setSavedLineage] = React.useState(null);
      const [compareStats, setCompareStats] = React.useState(null);
      const [showCompare, setShowCompare] = React.useState(false);
      const [showSideEvos, setShowSideEvos] = React.useState(false);

      const stage = level.toLowerCase();
      const maxPts = MAX_PTS[level];
      const stLocked = locked[stage];

      React.useEffect(() => {
        const lo = { Child: 0, Adult: 1, Perfect: 2, Ultimate: 3 };
        if (lo[level] < lo[prevLevel]) setSavedLineage(null);
        setPrevLevel(level);
      }, [level]);

      // Available digimon lists
      const availDigi = Object.entries(DigimonStats)
        .filter(([_, s]) => s.Digitama === digitama && s.Stage === level)
        .map(([n]) => n);

      const availChild = level === "Child" 
        ? availDigi 
        : level === "Adult" 
          ? (inheritMap[selDigi] || []) 
          : (inheritMap[selAdult] || []);

      const availAdult = level === "Perfect" 
        ? (perfectInheritMap[selDigi] || []) 
        : level === "Ultimate" 
          ? (perfectInheritMap[selPerf] || []) 
          : [];

      const availPerf = level === "Ultimate" 
        ? (ultimateInheritMap[selDigi] || []) 
        : [];

      // Update all training inputs
      const updateAll = React.useCallback((stg, newPts, lvl, changedStat) => {
        const mp = MAX_PTS[lvl || level];
        const lk = locked[stg];

        // 1. Restore locked stats
        ['hp','atk','spd'].forEach(s => {
          if (lk[s]) newPts[s] = tp[stg][s];
        });

        // 2. Clamp changedStat
        if (changedStat && !lk[changedStat]) {
          const otherLocked = ['hp','atk','spd']
            .filter(s => s !== changedStat && lk[s])
            .reduce((a, s) => a + newPts[s], 0);
          newPts[changedStat] = Math.max(0, Math.min(mp - otherLocked, newPts[changedStat]));
        }

        // 3. Budget remaining for unlocked others
        const lockedTotal = ['hp','atk','spd']
          .filter(s => lk[s])
          .reduce((a, s) => a + newPts[s], 0);

        const changedVal = changedStat && !lk[changedStat] ? newPts[changedStat] : null;
        const budget = mp - lockedTotal - (changedVal !== null ? changedVal : 0);
        const others = ['hp','atk','spd'].filter(s => !lk[s] && s !== changedStat);

        if (others.length > 0) {
          const othersTotal = others.reduce((a, s) => a + newPts[s], 0);
          if (othersTotal > budget) {
            const scale = budget > 0 && othersTotal > 0 ? budget / othersTotal : 0;
            others.forEach(s => {
              newPts[s] = Math.max(0, newPts[s] * scale);
            });
          }
        }

        // 4. Final safety clamp
        const total = ['hp','atk','spd'].reduce((a, s) => a + newPts[s], 0);
        if (total > mp) {
          const over = total - mp;
          const trimOrder = [...others, ...(changedStat && !lk[changedStat] ? [changedStat] : [])];
          let remaining = over;
          for (const s of trimOrder) {
            const trim = Math.min(newPts[s], remaining);
            newPts[s] -= trim;
            remaining -= trim;
            if (remaining <= 0) break;
          }
        }

        setTp(prev => ({ ...prev, [stg]: newPts }));

        const tot = newPts.hp + newPts.atk + newPts.spd || 1;
        setPct(prev => ({
          ...prev,
          [stg]: {
            hp:  (newPts.hp  / tot) * 100,
            atk: (newPts.atk / tot) * 100,
            spd: (newPts.spd / tot) * 100
          }
        }));

        const ns = getNatStats(selDigi, level, selChild, selAdult, selPerf, digitama, selBaby);
        if (ns) {
          setSiInput(prev => ({
            ...prev,
            [stg]: {
              hp:  (ns.HP * HP_MULT * newPts.hp).toFixed(2),
              atk: (ATK_SPD_MULT * newPts.atk).toFixed(2),
              spd: (ATK_SPD_MULT * newPts.spd).toFixed(2)
            }
          }));
        }
      }, [tp, locked, level, selDigi, selChild, selAdult, selPerf, digitama, selBaby]);

      // Apply split preset
      React.useEffect(() => {
        if (selSplit === "Lineage") {
          if (!savedLineage) return;
          setTp(prev => ({ ...prev, [stage]: { hp: savedLineage.hp, atk: savedLineage.atk, spd: savedLineage.spd } }));
          const tot = savedLineage.hp + savedLineage.atk + savedLineage.spd || 1;
          setPct(prev => ({
            ...prev,
            [stage]: {
              hp:  (savedLineage.hp  / tot) * 100,
              atk: (savedLineage.atk / tot) * 100,
              spd: (savedLineage.spd / tot) * 100
            }
          }));
        } else if (selSplit !== "Custom") {
          const [hP, aP, sP] = trainingSplits[selSplit];
          setPct(prev => ({
            ...prev,
            [stage]: { hp: hP * 100, atk: aP * 100, spd: sP * 100 }
          }));
          setTp(prev => ({
            ...prev,
            [stage]: { hp: maxPts * hP, atk: maxPts * aP, spd: maxPts * sP }
          }));
        }
      }, [selSplit, level, selBaby, savedLineage]);

      // Recalculate stats
      React.useEffect(() => {
        if (!selDigi) { setStats(null); return; }
        if (level !== "Child" && !selChild) { setStats(null); return; }
        if (level === "Perfect" && !selAdult) { setStats(null); return; }
        if (level === "Ultimate" && (!selAdult || !selPerf)) { setStats(null); return; }

        const base = getBase(selDigi, level, digitama, selChild);
        if (!base) { setStats(null); return; }

        const ns = getNatStats(selDigi, level, selChild, selAdult, selPerf, digitama, selBaby);
        if (!ns) { setStats(null); return; }

        const cur = tp[stage];
        const ts = calcTrained(ns, cur);
        const totalPts = cur.hp + cur.atk + cur.spd;

        setStats({
          Name: selDigi,
          Level: level,
          Type: base.Type,
          DType: base.DType,
          Digitama: digitama,
          Child: selChild || null,
          Adult: selAdult || null,
          Perfect: selPerf || null,
          NatHP: ns.HP,
          NatATK: ns.ATK,
          NatSPD: ns.SPD,
          DEF: ns.DEF,
          TrHP: ts.hpI,
          TrATK: ts.atkI,
          TrSPD: ts.spdI,
          TotHP: ts.HP,
          TotATK: ts.ATK,
          TotSPD: ts.SPD,
          TrainPct: Math.round(totalPts / MAX_PTS[level] * 100),
          Remaining: MAX_PTS[level] - totalPts
        });
      }, [selDigi, selChild, selAdult, selPerf, tp, level, digitama, selBaby]);

      const handlePctChange = (stat, val) => {
        if (stLocked[stat]) return;
        const nv = Math.max(0, Math.min(100, parseFloat(val) || 0));
        const lkSum = ['hp','atk','spd'].reduce((s, st) => s + (stLocked[st] ? pct[stage][st] : 0), 0);
        const adj = Math.min(nv, 100 - lkSum);
        const nPs = { ...pct[stage], [stat]: adj };
        const ul = ['hp','atk','spd'].filter(s => !stLocked[s] && s !== stat);
        const rem = 100 - lkSum - adj;

        if (ul.length === 0) nPs[stat] = 100 - lkSum;
        else if (rem <= 0) ul.forEach(s => nPs[s] = 0);
        else {
          const tot2 = ul.reduce((s, st) => s + pct[stage][st], 0) || 1;
          ul.forEach(s => {
            nPs[s] = Math.round((pct[stage][s] / tot2) * rem * 100) / 100;
          });
        }

        setPct(prev => ({ ...prev, [stage]: nPs }));
        updateAll(stage, {
          hp:  maxPts * (nPs.hp  / 100),
          atk: maxPts * (nPs.atk / 100),
          spd: maxPts * (nPs.spd / 100)
        });
      };

      const handlePtsChange = (stat, val) => {
        if (stLocked[stat]) return;
        const nv = Math.max(0, parseFloat(val) || 0);
        const nPs = { ...tp[stage], [stat]: nv };
        updateAll(stage, nPs, undefined, stat);
      };

      const handleVisPtsChange = (stat, val) => {
        if (stLocked[stat]) return;
        const nv = Math.max(0, parseFloat(val) || 0);
        const ns = getNatStats(selDigi, level, selChild, selAdult, selPerf, digitama, selBaby);
        if (!ns) return;

        setSiInput(prev => ({
          ...prev,
          [stage]: { ...prev[stage], [stat]: val }
        }));

        const ptVal = stat === 'hp' ? nv / (ns.HP * HP_MULT) : nv / ATK_SPD_MULT;
        const nPs = { ...tp[stage], [stat]: ptVal };
        updateAll(stage, nPs, undefined, stat);
      };

      const handleReset = () => {
        setTp(prev => ({ ...prev, [stage]: { hp: 0, atk: 0, spd: 0 } }));
        setPct(prev => ({ ...prev, [stage]: { hp: 0, atk: 0, spd: 0 } }));
      };

      const toggleLock = (stat) => {
        setLocked(prev => ({
          ...prev,
          [stage]: { ...prev[stage], [stat]: !prev[stage][stat] }
        }));
      };

      const handleSaveLineage = () => {
        setSavedLineage({ hp: tp[stage].hp, atk: tp[stage].atk, spd: tp[stage].spd });
        setToast("Lineage saved!");
      };

      const saveToSlot = (i) => {
        if (stats) {
          const n = [...savedSlots];
          n[i] = stats;
          setSavedSlots(n);
          setToast(`Saved to Slot ${i + 1}`);
        }
      };

      const compareWithSlot = (i) => {
        setCompareStats(savedSlots[i]);
        setShowCompare(true);
      };

      const applyBoost = (type) => {
        const before = { ...tp[stage] };
        const nPs = { ...tp[stage] };
        const mp = maxPts;

        switch (type) {
          case 'Lemon':      ['hp','atk','spd'].forEach(s => { if (!stLocked[s]) nPs[s] += 0.02 * mp; }); break;
          case 'C.Acorn':    ['hp','atk','spd'].forEach(s => { if (!stLocked[s]) nPs[s] += 1.25; }); break;
          case 'M.Shroom':   ['hp','atk','spd'].forEach(s => { if (!stLocked[s]) nPs[s] += 0.10 * mp; }); break;
          case 'Red+Shroom': nPs.atk += 0.30 * mp; break;
          case 'Blue+Shroom':nPs.spd += 0.30 * mp; break;
          case 'Green+Shroom':nPs.hp += 0.30 * mp; break;
          case 'Meat1':      nPs.atk += 1; break;
          case 'Meat2':      nPs.atk += 1.25; break;
          case 'Meat3':      nPs.hp += 1; nPs.atk += 1.25; break;
          case 'MeatX':      nPs.atk += 0.02 * mp; nPs.spd += 0.02 * mp; break;
          default: return;
        }

        const delta = {
          hp:  +(nPs.hp  - before.hp).toFixed(2),
          atk: +(nPs.atk - before.atk).toFixed(2),
          spd: +(nPs.spd - before.spd).toFixed(2)
        };

        updateAll(stage, nPs);
        setToast({ type: 'item', item: type, delta });
      };

      const totalUsed = tp[stage].hp + tp[stage].atk + tp[stage].spd;
      const remaining = maxPts - totalUsed;
      const hasSideEvos = stats && digimonGroups[stats.Name] && digimonGroups[stats.Name].length > 1;

      const navItems = [
  { 
    id: "config", 
    icon: "https://i.imgur.com/D4puzs5.png", 
    label: "Config" 
  },
  { 
    id: "train", 
    icon: "https://i.imgur.com/w83c8Zm.png", 
    label: "Training" 
  },
  { 
    id: "results", 
    icon: "https://i.imgur.com/omyPg60.png", 
    label: "Stats" 
  },
  { 
    id: "items", 
    icon: "https://i.imgur.com/KKQIk7T.png", 
    label: "Items" 
  },
  { 
    id: "slots", 
    icon: "https://i.imgur.com/6BooWHv.png", 
    label: "Save Slots" 
  }
];
      return (
        <div className="mob-shell">
          <div className="mob-header">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <img 
                src="https://i.imgur.com/9v0Bqen.png" 
                alt="Tamer Assist Portable Advance" 
                className="header-logo" 
              />
              {stats ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <img 
                    src={chibiImages[stats.Name] || placeholderImg} 
                    alt="" 
                    style={{ width: 26, height: 26, objectFit: 'contain' }} 
                  />
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 11, 
                    fontWeight: 700, 
                    color: 'var(--accent-cyan)' 
                  }}>
                    {stats.Name}
                  </span>
                  <span style={{ 
                    background: 'rgba(0,212,255,0.15)', 
                    border: '1px solid var(--accent-cyan)', 
                    borderRadius: 4, 
                    padding: '1px 6px', 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 9, 
                    color: 'var(--accent-cyan)' 
                  }}>
                    {level}
                  </span>
                </div>
              ) : (
                <span style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 9, 
                  color: 'var(--text-dim)', 
                  letterSpacing: 2 
                }}>
                  SELECT DIGIMON
                </span>
              )}
            </div>
          </div>

          <div className="mob-content">
            {tab === "config" && (
              <ConfigTab 
                digitama={digitama}
                setDigitama={setDigitama}
                level={level}
                setLevel={v => { setLevel(v); setSelDigi(""); setSelChild(""); setSelAdult(""); setSelPerf(""); }}
                selDigi={selDigi}
                setSelDigi={v => { setSelDigi(v); setSelChild(""); setSelAdult(""); setSelPerf(""); }}
                selChild={selChild}
                setSelChild={setSelChild}
                selAdult={selAdult}
                setSelAdult={v => { setSelAdult(v); setSelChild(""); }}
                selPerf={selPerf}
                setSelPerf={v => { setSelPerf(v); setSelAdult(""); setSelChild(""); }}
                selBaby={selBaby}
                setSelBaby={setSelBaby}
                availDigi={availDigi}
                availChild={availChild}
                availAdult={availAdult}
                availPerf={availPerf}
                handleSaveLineage={handleSaveLineage}
              />
            )}
            {tab === "train" && (
              <TrainTab 
                level={level}
                stage={stage}
                maxPts={maxPts}
                tp={tp}
                pct={pct}
                siInput={siInput}
                selSplit={selSplit}
                setSelSplit={setSelSplit}
                inputMethod={inputMethod}
                setInputMethod={setInputMethod}
                locked={stLocked}
                toggleLock={toggleLock}
                handlePctChange={handlePctChange}
                handlePtsChange={handlePtsChange}
                handleVisPtsChange={handleVisPtsChange}
                savedLineage={savedLineage}
                handleReset={handleReset}
                stats={stats}
                totalUsed={totalUsed}
                remaining={remaining}
              />
            )}
            {tab === "results" && (
              <ResultsTab 
                stats={stats}
                level={level}

                    color: 'var(--accent-red)',

          {toast && <Toast msg={toast} onDone={() => setToast(null)} />}

    }

    /* ─── CONFIG TAB ─────────────────────────────────── */

      selChild, setSelChild,

      const adultOpts = availAdult.map(n => ({ value: n, label: n }));
      const perfOpts = availPerf.map(n => ({ value: n, label: n }));

        { value: "AP", label: "AP" },

      return (
        <div className="panel">

            {(level === "Adult" || level === "Perfect" || level === "Ultimate") && (

    /* ─── TRAIN TAB ──────────────────────────────────── */
    function TrainTab({

      siInput,
      selSplit,
      setSelSplit,
      inputMethod,
      setInputMethod,
      locked,
      toggleLock,
      handlePctChange,
      handlePtsChange,
      handleVisPtsChange,
      savedLineage,
      handleReset,
      stats,
      totalUsed,
      remaining
    }) {
      const trainPct = stats ? stats.TrainPct : 0;
     // nomenclatura; Vis puntos visibles, TP Training points 
      // tuve que reworkear esto porque con UI nueva se rompio, evita que el sistema te pelee al borrar
      const [ptsDraft, setPtsDraft] = React.useState({ hp: '', atk: '', spd: '' });
      const [visDraft, setVisDraft] = React.useState({ hp: '', atk: '', spd: '' });

      // S
      React.useEffect(() => {
        setPtsDraft({
          hp:  tp[stage].hp.toFixed(2),
          atk: tp[stage].atk.toFixed(2),
          spd: tp[stage].spd.toFixed(2)
        });
      }, [tp[stage].hp, tp[stage].atk, tp[stage].spd]);

      React.useEffect(() => {
        setVisDraft({
          hp:  siInput[stage].hp  || '',
          atk: siInput[stage].atk || '',
          spd: siInput[stage].spd || ''
        });
      }, [siInput[stage].hp, siInput[stage].atk, siInput[stage].spd]);

      const statDefs = [
        { key: 'hp',  label: 'HP',  color: '#00ff88' },
        { key: 'atk', label: 'ATK', color: '#ff4444' },
        { key: 'spd', label: 'SPD', color: '#4488ff' }
      ];

      const splitOptions = Object.keys(trainingSplits).map(k => ({ value: k, label: k }));
      splitOptions.push({ value: 'Lineage', label: 'Lineage' + (savedLineage ? '' : ' (no saved)') });
      splitOptions.push({ value: 'Custom', label: 'Custom' });

      return (
        <div className="panel">
          {/* preview de stats en panel de entrenamiento */}
          {stats ? (
            <div style={{ 
              background: 'var(--bg-card)', 
              border: '1px solid rgba(255,255,255,0.07)', 
              borderRadius: 10, 
              padding: '10px 12px', 
              marginBottom: 10 
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
                <span style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 12, 
                  fontWeight: 700, 
                  color: 'white' 
                }}>
                  {stats.Name}
                </span>
                <span style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 9, 
                  color: 'var(--text-secondary)', 
                  letterSpacing: 1 
                }}>
                  {stats.Level}
                </span>
              </div>

              <div style={{ 
                display: 'grid', 
                gridTemplateColumns: '28px 1fr 1fr 1fr', 
                gap: 4, 
                marginBottom: 4 
              }}>
                <span />
                {['BASE', '+TRAIN', 'TOTAL'].map(h => (
                  <span 
                    key={h} 
                    style={{ 
                      fontFamily: "'Orbitron',monospace", 
                      fontSize: 8, 
                      color: 'var(--text-dim)', 
                      textAlign: 'right', 
                      letterSpacing: 0.5 
                    }}
                  >
                    {h}
                  </span>
                ))}
              </div>

              {[
                { label: 'HP',  color: '#00ff88', base: stats.NatHP, tr: Math.round(stats.TrHP), tot: stats.TotHP },
                { label: 'ATK', color: '#ff4444', base: stats.NatATK, tr: Math.round(stats.TrATK), tot: stats.TotATK },
                { label: 'SPD', color: '#4488ff', base: stats.NatSPD, tr: Math.round(stats.TrSPD), tot: stats.TotSPD },
                { label: 'DEF', color: '#8892b0', base: stats.DEF,    tr: 0,                      tot: stats.DEF }
              ].map(({ label, color, base, tr, tot }) => (
                <div 
                  key={label} 
                  style={{ 
                    display: 'grid', 
                    gridTemplateColumns: '28px 1fr 1fr 1fr', 
                    gap: 4, 
                    padding: '4px 0', 
                    borderTop: '1px solid rgba(255,255,255,0.04)' 
                  }}
                >
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 9, 
                    color, 
                    fontWeight: 700, 
                    letterSpacing: 0.5 
                  }}>
                    {label}
                  </span>
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 11, 
                    color: 'var(--text-secondary)', 
                    textAlign: 'right' 
                  }}>
                    {base}
                  </span>
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 11, 
                    color: tr > 0 ? color : 'var(--text-dim)', 
                    textAlign: 'right' 
                  }}>
                    {tr > 0 ? `+${tr}` : '-'}
                  </span>
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 12, 
                    color, 
                    fontWeight: 700, 
                    textAlign: 'right' 
                  }}>
                    {tot}
                  </span>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ 
              background: 'rgba(255,255,255,0.03)', 
              border: '1px dashed rgba(255,255,255,0.1)', 
              borderRadius: 10, 
              padding: 14, 
              marginBottom: 10, 
              textAlign: 'center', 
              color: 'var(--text-dim)', 
              fontFamily: "'Orbitron',monospace", 
              fontSize: 9, 
              letterSpacing: 2 
            }}>
              SELECT A DIGIMON TO SEE STATS
            </div>
          )}

          {/* Anille de progreso en el entrenamiento y encima animado si pones reset */}
          <div style={{ 
            display: 'flex', 
            alignItems: 'center', 
            gap: 12, 
            background: 'var(--bg-card)', 
            border: '1px solid rgba(255,255,255,0.07)', 
            borderRadius: 12, 
            padding: '12px 14px', 
            marginBottom: 10 
          }}>
            <ProgressRing pct={trainPct} usedPts={totalUsed} maxPts={maxPts} />
            <div style={{ flex: 1 }}>
              <div style={{ 
                fontFamily: "'Orbitron',monospace", 
                fontSize: 9, 
                color: 'var(--text-secondary)', 
                letterSpacing: 1, 
                marginBottom: 6 
              }}>
                DISTRIBUTION
              </div>
              {statDefs.map(({ key, label, color }) => (
                <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 8, 
                    color, 
                    width: 28, 
                    letterSpacing: 1 
                  }}>
                    {label}
                  </span>
                  <div style={{ 
                    flex: 1, 
                    height: 5, 
                    background: 'rgba(255,255,255,0.06)',

                      height: '100%', 
                      background: color,

                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 9, 
                    color, 
                    width: 34, 
                    textAlign: 'right'
