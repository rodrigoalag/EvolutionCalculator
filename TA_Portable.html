                    {(pct[stage][key] || 0).toFixed(1)}%
                  </span>
                </div>
              ))}
              <div style={{ 
                marginTop: 8, 
                paddingTop: 6, 
                borderTop: '1px solid rgba(255,255,255,0.06)', 
                display: 'flex', 
                justifyContent: 'space-between', 
                alignItems: 'center' 
              }}>
                <span style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 8, 
                  color: 'var(--text-dim)' 
                }}>
                  REMAINING
                </span>
                <span style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 11, 
                  color: remaining < maxPts * 0.1 ? '#ff4444' : remaining < maxPts * 0.3 ? '#ffd700' : '#00ff88', 
                  fontWeight: 700 
                }}>
                  {remaining.toFixed(1)}
                </span>
              </div>
            </div>
          </div>

          <div className="section-card">
            <div className="section-title">Split Preset</div>
            <div style={{ marginBottom: selSplit === 'Custom' ? 12 : 0 }}>
              <MobSelect 
                label="PRESET" 
                options={splitOptions} 
                value={selSplit} 
                onChange={v => setSelSplit(selSplit === 'Lineage' && !savedLineage ? selSplit : v)} 
                showImage={false} 
              />
            </div>

            {selSplit === "Custom" && (
              <>
                <div style={{ marginTop: 12 }}>
                  <div className="method-toggle">
                    {[
                      ["Porcentaje", "%"],
                      ["PuntosEntrenamiento", "Training Points"],
                      ["PuntosVisibles", "Visible Points"]
                    ].map(([v, l]) => (
                      <button 
                        key={v} 
                        className={`method-btn ${inputMethod === v ? 'active' : ''}`} 
                        onClick={() => setInputMethod(v)}
                      >
                        {l}
                      </button>
                    ))}
                  </div>
                </div>

                {statDefs.map(({ key, label, color }) => (
                  <div key={key} className="training-stat-block">
                    <div className="training-stat-header">
                      <span className="training-stat-name" style={{ color }}>
                        {label}
                      </span>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        {inputMethod === "Porcentaje" && (
                          <span className="training-stat-pct">
                            {(pct[stage][key] || 0).toFixed(1)}%
                          </span>
                        )}
                        {inputMethod === "PuntosEntrenamiento" && (
                          <span className="training-stat-pct">
                            {(tp[stage][key] || 0).toFixed(1)}
                            <span style={{ fontSize: 9, opacity: 0.6 }}>pts</span>
                          </span>
                        )}
                        <button 
                          className={`lock-btn ${locked[key] ? 'locked' : ''}`} 
                          onClick={() => toggleLock(key)}
                        >
                          {locked[key] ? '🔒' : '🔓'}
                        </button>
                      </div>
                    </div>

                    {inputMethod === "Porcentaje" && (
                      <input 
                        type="range" 
                        min="0" 
                        max="100" 
                        step="0.5"
                        value={pct[stage][key] || 0}
                        style={{ 
                          background: `linear-gradient(to right, ${color} 0%, ${color} ${pct[stage][key] || 0}%, rgba(255,255,255,0.1) ${pct[stage][key] || 0}%)` 
                        }}
                        disabled={locked[key]}
                        onChange={e => handlePctChange(key, e.target.value)}
                      />
                    )}

                    {inputMethod === "PuntosEntrenamiento" && (
                      <input 
                        className="num-input" 
                        type="number" 
                        min="0" 
                        step="0.01" 
                        max={maxPts}
                        value={ptsDraft[key]}
                        disabled={locked[key]}
                        onDoubleClick={e => e.target.select()}
                        onChange={e => {
                          const raw = e.target.value;
                          setPtsDraft(prev => ({ ...prev, [key]: raw }));
                        }}
                        onBlur={e => {
                          const v = e.target.value;
                          handlePtsChange(key, v === '' ? '0' : v);
                        }}
                      />
                    )}

                    {inputMethod === "PuntosVisibles" && (
                      <input 
                        className="num-input" 
                        type="number" 
                        min="0" 
                        step="1"
                        value={visDraft[key]}
                        disabled={locked[key]}
                        onDoubleClick={e => e.target.select()}
                        onChange={e => {
                          const raw = e.target.value;
                          setVisDraft(prev => ({ ...prev, [key]: raw }));
                        }}
                        onBlur={e => {
                          const v = e.target.value;
                          handleVisPtsChange(key, v === '' ? '0' : v);
                        }}
                        placeholder="0"
                      />
                    )}
                  </div>
                ))}
              </>
            )}
          </div>

          <button 
            className="action-btn danger" 
            onClick={handleReset}
          >
            <span>⟳</span> Reset Training
          </button>
        </div>
      );
    }

    /* ─── RESULTS TAB ────────────────────────────────── */
    function ResultsTab({
      stats,
      level,
      pct,
      maxPts,
      setSelDigi,
      showSideEvos,
      setShowSideEvos,
      hasSideEvos,
      totalUsed,
      digitama
    }) {
      const resultsRef = React.useRef(null);

      if (!stats || stats.Level !== level) {
        return (
          <div className="panel" style={{ 
            display: 'flex', 
            flexDirection: 'column', 
            alignItems: 'center', 
            justifyContent: 'center', 
            minHeight: 300, 
            gap: 16 
          }}>
            <div style={{ fontSize: 48, opacity: 0.25 }}>📊</div>
            <div style={{ 
              fontFamily: "'Orbitron',monospace", 
              fontSize: 11, 
              color: 'var(--text-dim)', 
              letterSpacing: 2, 
              textAlign: 'center' 
            }}>
              SELECT A DIGIMON<br/>TO SEE STATS
            </div>
          </div>
        );
      }

      const sk = stats.Level.toLowerCase();
      const sm = critProbMult[sk] ?? 0.178;
      const critRate = 5 + (stats.NatSPD * sm) + (stats.TrSPD * 0.021);
      const critDmg = critDamageSPDMultiplier(stats.TrSPD);
      const ovrDef = Math.round(stats.DEF * 1.15);
      const buffDef = Math.round(ovrDef * 1.1);
      const marks = [1.5, 2, 2.5, 3, 3.5, 4];
      const hiMark = marks.reduce((a, m, i) => critDmg >= m ? i : a, -1);
      const critFill = Math.max(0, Math.min(100, ((critDmg - 1.5) / (4 - 1.5)) * 100));
      const trainPct = stats.TrainPct;

      const handleScreenshot = () => {
        if (!resultsRef.current) return;
        const el = resultsRef.current;
        const prev = el.style.background;
        el.style.background = '#000';

        html2canvas(el, { 
          useCORS: true, 
          allowTaint: true, 
          backgroundColor: '#000', 
          scale: 2, 
          logging: false 
        }).then(c => {
          el.style.background = prev;
          const a = document.createElement('a');
          a.download = `${stats.Name}_stats.png`;
          a.href = c.toDataURL();
          a.click();
        }).catch(() => {
          el.style.background = prev;
        });
      };

      return (
        <div className="panel">
          <div ref={resultsRef}>
            {/* Hero card */}
            <div className="result-hero">
              <div className="result-header">
                <div>
                  <div className="result-name">{stats.Name}</div>
                  <div style={{ 
                    fontSize: 10, 
                    color: 'var(--text-secondary)', 
                    fontFamily: "'Orbitron',monospace", 
                    letterSpacing: 1, 
                    marginTop: 2 
                  }}>
                    {stats.Level}
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end' }}>
                  <div style={{ display: 'flex', gap: 6 }}>
                    {typeImages[stats.Type] && <img src={typeImages[stats.Type]} alt="" className="type-badge-img" />}
                    {stats.DType && DtypeImages[stats.DType] && <img src={DtypeImages[stats.DType]} alt="" className="type-badge-img" />}
                  </div>
                  {hasSideEvos && (
                    <button 
                      onClick={() => setShowSideEvos(!showSideEvos)} 
                      style={{ 
                        background: 'rgba(255,215,0,0.12)', 
                        border: '1px solid rgba(255,215,0,0.4)', 
                        borderRadius: 6, 
                        padding: '3px 8px', 
                        color: 'var(--accent-gold)', 
                        fontFamily: "'Orbitron',monospace", 
                        fontSize: 8, 
                        fontWeight: 700, 
                        cursor: 'pointer', 
                        letterSpacing: 1 
                      }}
                    >
                      SIDE EVO
                    </button>
                  )}
                </div>
              </div>

              {showSideEvos && hasSideEvos && (
                <div style={{ 
                  background: 'rgba(255,215,0,0.04)', 
                  borderBottom: '1px solid rgba(255,215,0,0.15)', 
                  padding: '10px 14px' 
                }}>
                  {digimonGroups[stats.Name]
                    .filter(d => d !== stats.Name)
                    .map(evo => (
                      <div 
                        key={evo} 
                        style={{ 
                          display: 'flex', 
                          alignItems: 'center', 
                          gap: 8, 
                          padding: '7px 0', 
                          borderBottom: '1px solid rgba(255,255,255,0.04)', 
                          cursor: 'pointer' 
                        }} 
                        onClick={() => { setSelDigi(evo); setShowSideEvos(false); }}
                      >
                        <img 
                          src={digimonImages[evo] || placeholderImg} 
                          alt={evo} 
                          style={{ width: 32, height: 32, objectFit: 'contain' }} 
                        />
                        <span style={{ 
                          fontFamily: "'Rajdhani',sans-serif", 
                          fontSize: 14, 
                          fontWeight: 700 
                        }}>
                          {evo}
                        </span>
                        <span style={{ marginLeft: 'auto', color: 'var(--accent-cyan)', fontSize: 14 }}>→</span>
                      </div>
                    ))}
                  <button 
                    onClick={() => setShowSideEvos(false)} 
                    style={{ 
                      marginTop: 8, 
                      width: '100%', 
                      padding: '6px', 
                      background: 'rgba(255,68,68,0.08)', 
                      border: '1px solid rgba(255,68,68,0.25)', 
                      borderRadius: 6, 
                      color: 'var(--accent-red)', 
                      fontFamily: "'Orbitron',monospace", 
                      fontSize: 9, 
                      cursor: 'pointer' 
                    }}
                  >
                    CLOSE
                  </button>
                </div>
              )}

              {/* Digimon image*/}
              <div className="result-digi-area">
                <div className="result-img-container">
                  <img 
                    src={digimonBG} 
                    alt="" 
                    className="result-img-bg" 
                    crossOrigin="anonymous" 
                  />
                  <img 
                    src={digimonImages[stats.Name] || placeholderImg} 
                    alt={stats.Name} 
                    className="result-img"
                    style={{ 
                      height: ({ 
                        'Child': '30%', 
                        'Adult': '70%', 
                        'Perfect': '100%', 
                        'Ultimate': '100%' 
                      }[stats.Level] || '100%') 
                    }}
                    crossOrigin="anonymous" 
                  />
                </div>
                <div className="result-stats-grid">
                  {[
                    { cls: 'hp',  label: 'HP',  nat: stats.NatHP,  tr: stats.TrHP,  tot: stats.TotHP,  c: '#00ff88' },
                    { cls: 'atk', label: 'ATK', nat: stats.NatATK, tr: stats.TrATK, tot: stats.TotATK, c: '#ff4444' },
                    { cls: 'spd', label: 'SPD', nat: stats.NatSPD, tr: stats.TrSPD, tot: stats.TotSPD, c: '#4488ff' },
                    { cls: 'def', label: 'DEF', nat: stats.DEF,    tr: 0,           tot: stats.DEF,    c: '#8892b0' }
                  ].map(({ cls, label, nat, tr, tot, c }) => (
                    <div key={label} className={`stat-card-mini ${cls}`}>
                      <span className="stat-mini-label" style={{ color: c }}>{label}</span>
                      <div className="stat-mini-vals">
                        <div className="stat-mini-total" style={{ color: c }}>{tot}</div>
                        <div className="stat-mini-breakdown">
                          {nat}
                          {tr > 0 && <span style={{ color: c }}> +{Math.round(tr)}</span>}
                          {label === 'DEF' && <span style={{ opacity: 0.5 }}> → {buffDef}</span>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Distribution + training ring */}
            <div style={{ 
              display: 'flex', 
              alignItems: 'center', 
              gap: 12, 
              background: 'var(--bg-card)', 
              border: '1px solid rgba(255,255,255,0.07)', 
              borderRadius: 12, 
              padding: '12px 14px', 
              marginBottom: 10 
            }}>
              <ProgressRing pct={trainPct} usedPts={totalUsed} maxPts={maxPts} />
              <div style={{ flex: 1 }}>
                <div style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 9, 
                  color: 'var(--text-secondary)', 
                  letterSpacing: 1, 
                  marginBottom: 6 
                }}>
                  DISTRIBUTION
                </div>
                {[
                  { key: 'hp',  label: 'HP',  color: '#00ff88' },
                  { key: 'atk', label: 'ATK', color: '#ff4444' },
                  { key: 'spd', label: 'SPD', color: '#4488ff' }
                ].map(({ key, label, color }) => (
                  <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
                    <span style={{ 
                      fontFamily: "'Orbitron',monospace", 
                      fontSize: 8, 
                      color, 
                      width: 28, 
                      letterSpacing: 1 
                    }}>
                      {label}
                    </span>
                    <div style={{ 
                      flex: 1, 
                      height: 5, 
                      background: 'rgba(255,255,255,0.06)', 
                      borderRadius: 3, 
                      overflow: 'hidden' 
                    }}>
                      <div style={{ 
                        height: '100%', 
                        background: color, 
                        width: `${pct[sk]?.[key] || 0}%`, 
                        borderRadius: 3, 
                        transition: 'width 0.4s' 
                      }} />
                    </div>
                    <span style={{ 
                      fontFamily: "'Orbitron',monospace", 
                      fontSize: 9, 
                      color, 
                      width: 34, 
                      textAlign: 'right' 
                    }}>
                      {(pct[sk]?.[key] || 0).toFixed(1)}%
                    </span>
                  </div>
                ))}
                <div style={{ 
                  marginTop: 8, 
                  paddingTop: 6, 
                  borderTop: '1px solid rgba(255,255,255,0.06)', 
                  display: 'flex', 
                  justifyContent: 'space-between', 
                  alignItems: 'center' 
                }}>
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 8, 
                    color: 'var(--text-dim)' 
                  }}>
                    REMAINING
                  </span>
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 11, 
                    color: stats.Remaining < maxPts * 0.1 ? '#ff4444' : stats.Remaining < maxPts * 0.3 ? '#ffd700' : '#00ff88', 
                    fontWeight: 700 
                  }}>
                    {(stats.Remaining || 0).toFixed(1)}
                  </span>
                </div>
              </div>
            </div>

            {/* Crit stats */}
            <div className="crit-section">
              <div style={{ 
                fontFamily: "'Orbitron',monospace", 
                fontSize: 9, 
                fontWeight: 700, 
                letterSpacing: 2, 
                color: 'var(--accent-gold)', 
                marginBottom: 8 
              }}>
                CRITICAL STATS
              </div>
              <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
                {[
                  { label: 'CRIT RATE', val: `${critRate.toFixed(1)}%` },
                  { label: 'CRIT DMG',  val: `${critDmg.toFixed(2)}×` }
                ].map(({ label, val }) => (
                  <div 
                    key={label} 
                    style={{ 
                      flex: 1, 
                      background: 'rgba(0,0,0,0.3)', 
                      borderRadius: 8, 
                      padding: '8px', 
                      textAlign: 'center' 
                    }}
                  >
                    <div style={{ 
                      fontFamily: "'Orbitron',monospace", 
                      fontSize: 8, 
                      color: 'rgba(255,215,0,0.6)', 
                      letterSpacing: 1, 
                      marginBottom: 3 
                    }}>
                      {label}
                    </div>
                    <div style={{ 
                      fontFamily: "'Orbitron',monospace", 
                      fontSize: 18, 
                      fontWeight: 700, 
                      color: 'var(--accent-gold)' 
                    }}>
                      {val}
                    </div>
                  </div>
                ))}
              </div>
              <div className="crit-bar-track">
                <div className="crit-bar-fill" style={{ width: `${critFill}%` }} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
                {marks.map((m, i) => (
                  <span 
                    key={m} 
                    className={`crit-mark ${i === hiMark ? 'active' : ''}`}
                  >
                    {m.toFixed(1)}
                  </span>
                ))}
              </div>
            </div>

            {/* Lineage */}
            <div className="section-card">
              <div className="section-title">Lineage</div>
              <div className="lineage-display">
                {/* Digitama first */}
                <div 
                  className="lineage-badge" 
                  style={{ 
                    background: 'rgba(255,215,0,0.08)', 
                    border: '1px solid rgba(255,215,0,0.2)' 
                  }}
                >
                  <img 
                    src={digitamaImages[digitama] || placeholderImg} 
                    alt={digitama} 
                    style={{ width: 22, height: 22, objectFit: 'contain' }} 
                  />
                  <span style={{ 
                    fontFamily: "'Orbitron',monospace", 
                    fontSize: 10, 
                    fontWeight: 700, 
                    color: 'var(--accent-gold)' 
                  }}>
                    {(digitamaOptions.find(o => o.value === digitama) || { label: digitama }).label}
                  </span>
                </div>

                {[stats.Child, stats.Adult, stats.Perfect].filter(Boolean).length > 0 && (
                  <span style={{ color: 'var(--accent-gold)', fontSize: 12 }}>→</span>
                )}

                {[stats.Child, stats.Adult, stats.Perfect]
                  .filter(Boolean)
                  .map((d, i, arr) => (
                    <React.Fragment key={i}>
                      <div className="lineage-badge">
                        <img 
                          src={chibiImages[d] || placeholderImg} 
                          alt={d} 
                          style={{ width: 22, height: 22, objectFit: 'contain' }} 
                        />
                        <span style={{ 
                          fontFamily: "'Rajdhani',sans-serif", 
                          fontSize: 12, 
                          fontWeight: 700 
                        }}>
                          {d}
                        </span>
                      </div>
                      {i < arr.length - 1 && <span style={{ color: 'var(--accent-gold)', fontSize: 12 }}>→</span>}
                    </React.Fragment>
                  ))}
              </div>
            </div>
          </div>

          <button 
            className="action-btn success" 
            style={{ marginTop: 4 }} 
            onClick={handleScreenshot}
          >
            <span>📸</span> Save Screenshot
          </button>
        </div>
      );
    }

    function critDamageSPDMultiplier(trainedSpd) {
      return critDmgConst[2] +
             (Math.pow(trainedSpd / 100, 2) * critDmgConst[0]) +
             ((trainedSpd / 100) * critDmgConst[1]);
    }

    /* ─── ITEMS TAB ──────────────────────────────────── */
    function ItemsTab({ applyBoost, stats, level, stage, tp, locked, updateAll, remaining }) {
      const [mode, setMode] = React.useState("food");
      const [instVal, setInstVal] = React.useState(1);
      const [instStat, setInstStat] = React.useState("hp");

      const mp = MAX_PTS[level] || 87.5;
      const lk = locked;

      const ptLemon   = 0.02 * mp;
      const ptAcorn   = 1.25;
      const ptMShroom = 0.10 * mp;
      const ptShroom  = 0.30 * mp;
      const ptMeatX   = 0.02 * mp;

      const isXDigi     = stats && X_Digi.includes(stats.Name);
      const isAdultPlus = level !== "Child";

      const disLemon     = !stats || remaining < 3 * ptLemon;
      const disAcorn     = !stats || remaining < 3 * ptAcorn;
      const disMShroom   = !stats || remaining < 3 * ptMShroom;
      const disRedShroom = !stats || remaining < ptShroom || lk.atk;
      const disBluShroom = !stats || remaining < ptShroom || lk.spd;
      const disGrnShroom = !stats || remaining < ptShroom || lk.hp;
      const disMeat1     = !stats || remaining < 1 || lk.atk;
      const disMeat2     = !stats || remaining < 1.25 || lk.atk;
      const disMeat3     = !stats || remaining < (1 + 1.25) || lk.hp || lk.atk || !isAdultPlus;
      const disMeatX     = !stats || remaining < 2 * ptMeatX || lk.atk || lk.spd || !isXDigi;

      const foodItems = [
        { id: 'Lemon',       img: 'https://i.imgur.com/cSCXM1V.png', label: 'Lemon',      disabled: disLemon },
        { id: 'C.Acorn',     img: 'https://i.imgur.com/TFUn72E.png', label: 'C.Acorn',    disabled: disAcorn },
        { id: 'M.Shroom',    img: 'https://i.imgur.com/ltvFKTU.png', label: 'M.Shroom',   disabled: disMShroom },
        { id: 'Red+Shroom',  img: 'https://i.imgur.com/LtJq9a6.png', label: 'Shroom+ATK',       disabled: disRedShroom },
        { id: 'Blue+Shroom', img: 'https://i.imgur.com/AIzesAR.png', label: 'Shroom+SPD',       disabled: disBluShroom },
        { id: 'Green+Shroom',img: 'https://i.imgur.com/U047z9I.png', label: 'Shroom+HP',        disabled: disGrnShroom },
        { id: 'Meat1',       img: 'https://i.imgur.com/23iVUfb.png', label: 'Aged Meat',  disabled: disMeat1 },
        { id: 'Meat2',       img: 'https://i.imgur.com/KexkNJ5.png', label: 'Dense Meat', disabled: disMeat2 },
        { id: 'Meat3',       img: 'https://i.imgur.com/EY4V4ca.png', label: 'Jurassic',   disabled: disMeat3 },
        { id: 'MeatX',       img: 'https://i.imgur.com/KjHuIem.png', label: 'Meat-X',     disabled: disMeatX }
      ];

      const ptAdd = instVal === 15 ? 3.625 : instVal * 0.175;
      const instDis = !stats || remaining < ptAdd || locked[instStat];

      const applyInstall = () => {
        if (instDis) return;
        const nPs = { ...tp[stage] };
        nPs[instStat] += ptAdd;
        updateAll(stage, nPs, undefined, instStat);
      };

      return (
        <div className="panel">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 12 }}>
            <button 
              className={`action-btn ${mode === 'food' ? 'primary' : ''}`} 
              style={mode !== 'food' ? { 
                background: 'var(--bg-elevated)', 
                border: '1px solid rgba(255,255,255,0.08)', 
                color: 'var(--text-secondary)' 
              } : {}}
              onClick={() => setMode('food')}
            >
              🍋 Food
            </button>
            <button 
              className={`action-btn ${mode === 'install' ? 'purple' : ''}`} 
              style={mode !== 'install' ? { 
                background: 'var(--bg-elevated)', 
                border: '1px solid rgba(255,255,255,0.08)', 
                color: 'var(--text-secondary)' 
              } : {}}
              onClick={() => setMode('install')}
            >
              ⚡ Install
            </button>
          </div>

          {mode === 'food' && (
            <div className="section-card">
              <div className="section-title">Food Items</div>
              <div className="food-grid">
                {foodItems.map(item => (
                  <button 
                    key={item.id} 
                    className="food-item-btn" 
                    disabled={item.disabled} 
                    onClick={() => applyBoost(item.id)}
                    style={{ 
                      filter: item.disabled ? 'grayscale(100%) opacity(0.4)' : 'none', 
                      transition: 'filter 0.2s' 
                    }}
                  >
                    <img 
                      src={item.img} 
                      alt={item.label} 
                      onError={e => { e.target.style.display = 'none'; }} 
                    />
                    <span className="food-item-label">{item.label}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {mode === 'install' && (
            <div className="section-card">
              <div className="section-title">Training Install</div>
              <div style={{ 
                fontFamily: "'Orbitron',monospace", 
                fontSize: 9, 
                color: 'var(--text-secondary)', 
                letterSpacing: 1, 
                marginBottom: 7 
              }}>
                VALUE
              </div>
              <div className="install-value-grid">
                {Array.from({ length: 15 }, (_, i) => i + 1).map(v => (
                  <button 
                    key={v} 
                    className={`install-val-btn ${instVal === v ? 'active' : ''}`} 
                    onClick={() => setInstVal(v)}
                  >
                    {v}
                  </button>
                ))}
              </div>

              <div style={{ 
                fontFamily: "'Orbitron',monospace", 
                fontSize: 9, 
                color: 'var(--text-secondary)', 
                letterSpacing: 1, 
                marginBottom: 7 
              }}>
                STAT
              </div>
              <div className="install-stat-selector">
                {[
                  { k: 'hp',  l: 'HP',  c: '#00ff88' },
                  { k: 'atk', l: 'ATK', c: '#ff4444' },
                  { k: 'spd', l: 'SPD', c: '#4488ff' }
                ].map(({ k, l, c }) => (
                  <button 
                    key={k} 
                    className={`install-stat-btn ${k} ${instStat === k ? 'active' : ''}`}
                    style={instStat === k 
                      ? { borderColor: c, background: `${c}18`, color: c } 
                      : { color: 'var(--text-secondary)' }
                    }
                    disabled={locked[k]} 
                    onClick={() => !locked[k] && setInstStat(k)}
                  >
                    <div 
                      className="dot" 
                      style={{ 
                        background: c, 
                        boxShadow: instStat === k ? `0 0 8px ${c}` : 'none' 
                      }} 
                    />
                    {l}
                  </button>
                ))}
              </div>

              <div style={{ 
                background: 'rgba(0,0,0,0.3)', 
                borderRadius: 8, 
                padding: '10px 12px', 
                marginBottom: 12, 
                display: 'flex', 
                justifyContent: 'space-between' 
              }}>
                <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Points to add:</span>
                <span style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 14, 
                  fontWeight: 700, 
                  color: '#c084fc' 
                }}>
                  {ptAdd.toFixed(3)}
                </span>
              </div>

              <button 
                className="action-btn purple" 
                disabled={instDis} 
                onClick={applyInstall}
              >
                ⚡ Apply Install
              </button>
            </div>
          )}
        </div>
      );
    }

    /* ─── SLOTS TAB ──────────────────────────────────── */
    function SlotsTab({ savedSlots, saveToSlot, compareWithSlot, stats }) {
      return (
        <div className="panel">
          <div className="section-card">
            <div className="section-title">Save Slots</div>
            <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 10 }}>
              Tap slot to save current. Tap CMP to compare.
            </div>
            {[0,1,2,3,4,5].map(i => (
              <div 
                key={i} 
                className="save-slot" 
                onClick={() => saveToSlot(i)}
              >
                <div className="save-slot-icon">
                  {savedSlots[i] ? (
                    <img 
                      src={chibiImages[savedSlots[i].Name] || placeholderImg} 
                      alt="" 
                      style={{ width: '100%', height: '100%', objectFit: 'contain' }} 
                    />
                  ) : (
                    <span style={{ color: 'var(--text-dim)', fontSize: 16 }}>+</span>
                  )}
                </div>
                <div style={{ flex: 1 }}>
                  <div 
                    className="save-slot-name" 
                    style={{ color: savedSlots[i] ? 'var(--text-primary)' : 'var(--text-dim)' }}
                  >
                    {savedSlots[i] ? savedSlots[i].Name : `Slot ${i + 1}`}
                  </div>
                  {savedSlots[i] && (
                    <div style={{ 
                      fontSize: 10, 
                      color: 'var(--text-secondary)', 
                      fontFamily: "'Orbitron',monospace" 
                    }}>
                      {savedSlots[i].Level} • {savedSlots[i].TrainPct}%
                    </div>
                  )}
                </div>
                {savedSlots[i] && (
                  <button 
                    className="compare-btn-sm" 
                    onClick={e => { e.stopPropagation(); compareWithSlot(i); }}
                  >
                    CMP
                  </button>
                )}
              </div>
            ))}
            {!stats && (
              <div style={{ 
                textAlign: 'center', 
                padding: '10px', 
                color: 'var(--text-dim)', 
                fontFamily: "'Orbitron',monospace", 
                fontSize: 9, 
                letterSpacing: 1 
              }}>
                NO ACTIVE DIGIMON
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ─── COMPARE CARD ───────────────────────────────── */
    function CompareCard({ stats, label, accent }) {
      const ovrDef = Math.round(stats.DEF * 1.15);
      const buffDef = Math.round(ovrDef * 1.1);

      return (
        <div style={{ 
          background: 'var(--bg-card)', 
          border: `1px solid ${accent}33`, 
          borderRadius: 12, 
          overflow: 'hidden' 
        }}>
          <div style={{ 
            padding: '10px 14px', 
            background: 'rgba(0,0,0,0.4)', 
            borderBottom: `1px solid ${accent}22`, 
            display: 'flex', 
            alignItems: 'center', 
            justifyContent: 'space-between' 
          }}>
            <div>
              <div style={{ 
                fontFamily: "'Orbitron',monospace", 
                fontSize: 9, 
                fontWeight: 700, 
                color: accent, 
                letterSpacing: 2, 
                marginBottom: 2 
              }}>
                {label}
              </div>
              <div style={{ 
                fontFamily: "'Orbitron',monospace", 
                fontSize: 16, 
                fontWeight: 900, 
                color: 'white' 
              }}>
                {stats.Name}
              </div>
              <div style={{ 
                fontSize: 10, 
                color: 'var(--text-secondary)', 
                fontFamily: "'Orbitron',monospace" 
              }}>
                {stats.Level} • {stats.TrainPct}%
              </div>
            </div>
            <img 
              src={chibiImages[stats.Name] || placeholderImg} 
              alt="" 
              style={{ width: 44, height: 44, objectFit: 'contain' }} 
            />
          </div>
          <div style={{ padding: 12, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {[
              { l: 'HP',  v: stats.TotHP,  c: '#00ff88' },
              { l: 'ATK', v: stats.TotATK, c: '#ff4444' },
              { l: 'SPD', v: stats.TotSPD, c: '#4488ff' },
              { l: 'DEF', v: `${stats.DEF}→${buffDef}`, c: '#8892b0' }
            ].map(({ l, v, c }) => (
              <div 
                key={l} 
                style={{ 
                  background: 'rgba(0,0,0,0.3)', 
                  borderRadius: 8, 
                  padding: '8px 10px' 
                }}
              >
                <div style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 9, 
                  color: 'var(--text-secondary)', 
                  letterSpacing: 1, 
                  marginBottom: 3 
                }}>
                  {l}
                </div>
                <div style={{ 
                  fontFamily: "'Orbitron',monospace", 
                  fontSize: 18, 
                  fontWeight: 700, 
                  color: c 
                }}>
                  {v}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function DesktopApp() {
     }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
